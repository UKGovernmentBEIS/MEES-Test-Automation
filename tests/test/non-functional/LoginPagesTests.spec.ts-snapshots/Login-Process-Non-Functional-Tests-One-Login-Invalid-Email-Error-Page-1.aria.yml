- main:
  - alert:
    - heading "There is a problem" [level=2]
    - list:
      - listitem:
        - link "Enter an email address in the correct format, like name@example.com":
          - /url: "#email"
  - heading "Enter your email address to sign in to your GOV.UK One Login" [level=1]
  - paragraph: "Error: Enter an email address in the correct format, like name@example.com"
  - textbox "Enter your email address to sign in to your GOV.UK One Login"
  - button "Continue"