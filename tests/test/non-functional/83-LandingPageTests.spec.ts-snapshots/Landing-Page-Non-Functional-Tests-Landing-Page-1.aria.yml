- main:
  - heading "Check if non-domestic properties meet minimum energy efficiency standards" [level=1]
  - paragraph: This service is for non-domestic properties only.
  - paragraph: /Part 3 of the Energy Efficiency \(Private Rented Property\) \(England and Wales\) Regulations \d+ imposes a minimum energy efficiency standard for non-domestic privately rented properties \(the "MEES Regulations"\)\./
  - paragraph: Landlords of non-domestic privately rented properties who have an energy performance certificate (EPC), must comply with the MEES Regulations by holding an EPC for energy band E (unless a valid exemption applies).
  - paragraph: "You can use this service to:"
  - list:
    - listitem: search for non-domestic properties with a sub-standard energy rating
    - listitem: check whether there is evidence a property may be rented
    - listitem: check non-domestic property Private Rented Sector (PRS) exemption status
    - listitem: find property owner details
    - listitem: view enforcement guidance
    - listitem: calculate penalties for non-compliance
  - paragraph: This service is for local authorities only.
  - heading "Register" [level=2]
  - paragraph: You must register for a personal account to access this service.
  - paragraph:
    - link "You can register by completing this Microsoft Form (opens in a new tab).":
      - /url: https://forms.office.com/e/1e9mQDGXvH
  - paragraph: /You will receive an email when your account has been successfully created\. We aim to create new accounts within \d+ working days\./
  - heading "Sign in" [level=2]
  - text: "You will need:"
  - list:
    - listitem: to use the email you used in the sign up form
    - listitem: to log in to your GOV.UK One Login account via the invitation that was emailed to you
  - button "Sign in"
  - heading "If you need help" [level=2]
  - text: "Contact our support team if you:"
  - list:
    - listitem: need help using this service
    - listitem: need technical support
    - listitem: want to report a problem
  - paragraph:
    - link "Request support":
      - /url: /support
  - paragraph: /We aim to respond within \d+ working days\./
  - complementary:
    - navigation "Related":
      - heading "Related" [level=2]
      - list:
        - listitem:
          - link "Review exemptions for private rented sector energy standards":
            - /url: https://www.view-energy-efficiency-exemptions.service.gov.uk
        - listitem:
          - link "Find an energy certificate":
            - /url: https://www.gov.uk/find-energy-certificate