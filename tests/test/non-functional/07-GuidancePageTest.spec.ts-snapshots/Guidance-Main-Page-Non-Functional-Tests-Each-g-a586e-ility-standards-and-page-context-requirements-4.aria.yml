    - heading "The MEES Regulations" [level=2]
    - paragraph
    - text: The Minimum Energy Efficiency Standards (MEES) Regulations set the lowest energy efficiency level that non-domestic privately rented properties in England and Wales must meet.
    - paragraph
    - paragraph
    - text: The legal requirement for the MEES Regulations comes from the
    - link /Energy Efficiency \(Private Rented Property\) \(England and Wales\) Regulations \d+\./:
      - /url: https://www.legislation.gov.uk/uksi/2015/962/contents
    - paragraph
    - paragraph
    - text: The MEES Regulations aim to reduce emissions and improve energy performance across the domestic and non-domestic Private Rented Sector (PRS).
    - paragraph
    - heading "Current minimum energy rating" [level=2]
    - paragraph
    - text: A non-domestic PRS property must have an Energy Performance Certificate (EPC) rating of E or above to be legally let to a new tenant, unless a valid exemption applies.
    - paragraph
    - paragraph
    - text: /Since 1 April \d+, landlords cannot grant a new lease for a property rated F or G\./
    - paragraph
    - paragraph
    - text: /Since 1 April \d+, the same requirement applies to all non-domestic rented properties, including those with existing tenants\./
    - paragraph
    - paragraph
    - text: "If a landlord wants to continue letting a property with an F or G rating, they must either:"
    - list
    - listitem: improve the energy rating to at least E
    - listitem: register a valid exemption on the PRS Exemptions Register
    - paragraph
    - heading "Your responsibilities as an enforcement officer" [level=2]
    - paragraph
    - text: You need to determine whether a property is in scope of the MEES Regulations, determine if it meets the minimum standard of energy efficiency, and check if a valid PRS exemption exists before you can assess non-compliance.
    - paragraph
    - paragraph
    - link "An enforcement timeline is available in this service to assist you with this.":
      - /url: https://desnz-gm--prseqa.sandbox.my.site.com/compliance/guidance-detail?contentKey=MC6MPUO6E7K5FBJDQOAA34AGC4NY
    - paragraph
    - paragraph
    - text: "You must use your own judgement and carry out due diligence. Always verify information with external systems such as:"
    - paragraph
    - list
    - listitem:
      - text: the official
      - link "EPC Register":
        - /url: https://www.gov.uk/find-energy-certificate
    - listitem:
      - text: the
      - link "PRS Exemptions Register":
        - /url: https://prsregister.beis.gov.uk/NdsBeisUi/register-search-exemptions
    - listitem: local authority tenancy records
    - listitem: relevant legislation and guidance
    - heading "Exemptions you may encounter" [level=2]
    - paragraph
    - text: "A landlord may legally let a sub-standard property if they register a valid exemption on the PRS Exemptions Register. The exemptions that apply to non-domestic properties are:"
    - paragraph
    - list
    - listitem: ‘7 Year Payback’ Exemption
    - listitem: ‘All Improvements Made’ Exemption
    - listitem: ‘Wall Insulation’ Exemption
    - listitem: ‘Consent’ Exemption
    - listitem: ‘Devaluation’ Exemption
    - listitem: ‘New Landlord’ Exemption
    - paragraph
    - text: "You should always confirm that:"
    - paragraph
    - list
    - listitem: the exemption is correctly registered
    - listitem: it applies to the specific property
    - listitem: it is still valid within its time frame
    - paragraph
    - link "Guidance on these exemption types and the evidence that a landlord can submit with their exemption is available on GOV.UK.":
      - /url: https://www.gov.uk/government/publications/private-rented-sector-minimum-energy-efficiency-standard-exemptions/guidance-on-prs-exemptions-and-exemptions-register-evidence-requirements
    - paragraph
    - heading "If you need more information" [level=2]
    - paragraph: "You can:"
    - list
    - listitem:
      - link "read the full non-domestic MEES landlord and enforcement guidance":
