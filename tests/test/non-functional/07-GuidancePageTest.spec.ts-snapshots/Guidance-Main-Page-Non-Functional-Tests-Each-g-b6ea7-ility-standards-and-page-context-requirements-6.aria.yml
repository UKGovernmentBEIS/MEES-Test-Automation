  - heading "How property records are created" [level=2]
  - paragraph: "Multiple datasets are combined in this service to create a single record for each property. The following steps are taken to create each record:"
  - list:
    - listitem: If an Energy Performance Certificate (EPC) has an associated Unique Property Reference Number (UPRN) it is used as the starting point for creating a property record.
    - listitem: If the EPC is missing the UPRN, the service will attempt to use the Ordnance Survey (OS) AddressBase Premium dataset to find the associated UPRN for that property.
    - listitem: When a property record has an associated UPRN, it is used to add property owner data from the HMLR dataset.
    - listitem: The Companies House dataset is then used to add company details to the property record for cases when the property is owned by one or more companies - this is done using the company registration number on the HMLR CCOD or the HMLR OCOD dataset.
    - listitem: The UPRN is then used to add 'PRS exemption' and 'PRS Penalty' records from the PRS Exemptions Register data.
  - paragraph: This data is then displayed in the service as a single property record.
  - heading "Why some information may not appear" [level=2]
  - paragraph: "Some fields in the property records table or the property details page may be missing if:"
  - list:
    - listitem: an individual has opted out of having their EPC data disclosed publicly
    - listitem: an EPC for a property has no associated UPRN
    - listitem: no UPRN was found when attempting to match EPC register data with OS AddressBase Premium data
    - listitem: property owner data from the HMLR datasets is incomplete
    - listitem: company details were not found in the Companies House data
    - listitem: PRS Exemption Register records lack an associated UPRN
    - listitem: there are no exemptions or penalties registered in the PRS Exemptions Register for that property
  - heading "Ministry of Housing, Communities & Local Government (MHCLG)" [level=2]
  - paragraph: The Energy Performance Certificate (EPC) Non-Domestic dataset from MHCLG contains the EPCs for the non-domestic properties displayed in this service.
  - paragraph:
    - text: If an individual has
    - link "opted out of having their EPC data disclosed publicly":
      - /url: https://www.gov.uk/guidance/energy-performance-certificates-opt-out-of-public-disclosure#how-do-i-opt-out
    - text: ", then this information is not displayed in this service."
  - paragraph: "This dataset is used for:"
  - list:
    - listitem: getting the energy rating of a property
    - listitem: providing the transaction type - this is the reason the EPC was generated which can help to identify rented properties
    - listitem: providing unique building reference numbers
    - listitem: defining property type
    - listitem: providing lodgement date
    - listitem: providing address details
  - paragraph: This data is refreshed monthly.
  - heading "Ordnance Survey (OS)" [level=2]
  - paragraph: The AddressBase Premium dataset from the Ordnance Survey (OS) provides the Unique Property Reference Number (UPRN) and standardised address details for each property.
  - paragraph: "This dataset is used for:"
  - list:
    - listitem: creating the base address record for a property
    - listitem: adding the UPRN to property records where it is missing from the EPC
    - listitem: ensuring datasets use the correct UPRN
  - paragraph: This data is refreshed every 6 weeks.
  - heading "HM Land Registry (HMLR)" [level=2]
  - paragraph: From HMLR, there are three data sources that supply information to this service.
  - paragraph: The HMLR Commercial and Corporate Ownership Data (CCOD) and HMLR Overseas Ownership Data (OCOD) provide information on property ownership.
  - paragraph: "The HMLR CCOD and HMLR OCOD datasets are used for:"
  - list:
    - listitem: identifying property owners
    - listitem: determining whether a property owner is onshore or offshore
  - paragraph: "The HMLR Polygon dataset is also used for:"
  - list:
    - listitem: linking property owners to properties using title information and UPRN information
    - listitem: linking property owners to EPC data
  - paragraph: This data is refreshed monthly.
  - heading "Valuation Office Agency (VOA)" [level=2]
  - paragraph: The Business Rates dataset from the VOA provides the rateable value for the properties in the service.
  - paragraph: "This dataset is used for:"
  - list:
    - listitem: providing the rateable value of the property to be used in calculating financial penalties
  - paragraph: This data is refreshed monthly.
  - heading "Companies House" [level=2]
  - paragraph: The Companies House dataset provides company registration details, addresses, and Standard Industrial Classification (SIC) codes.
  - paragraph: "This dataset is used for:"
  - list:
    - listitem: identifying a company as the owner of a property to determine the appropriate business address to contact
    - listitem: identifying business activity of those companies using SIC codes - this can help to identify if the property is a non-domestic PRS property
  - paragraph: This data is refreshed monthly.
  - heading "PRS Exemptions Register statuses" [level=2]
  - paragraph: The PRS Exemptions Register provides the 'PRS exemption' and 'PRS penalty' data displayed when viewing the property records table and property detail pages.
  - paragraph: "To understand the 'PRS exemption' statuses:"
  - list:
    - listitem: "'Found' indicates that one or more exemptions have been registered by a landlord of the property"
  - paragraph: "To understand the 'PRS penalty' status:"
  - list:
    - listitem: "'Recorded' indicates that a penalty has been issued to the landlord and has been recorded in the PRS Exemption Register"
  - paragraph: If 'Not found' is displayed, either no records are shown in the PRS Exemptions Register, or a property is listed in the PRS Exemptions Register but has no UPRN or a different UPRN. This may occur due to manual address entry whilst creating records and prevents the service from matching records. Before beginning any enforcement, check the PRS Exemptions Register records as part of due diligence.
  - paragraph: This data is refreshed daily.