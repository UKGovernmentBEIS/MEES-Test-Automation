  - heading "Non-domestic PRS properties" [level=1]
  - paragraph:
    - text: /The MEES Regulations apply to all non-domestic rented properties that are legally required to have an Energy Performance Certificate \(EPC\)\. This requirement comes from Regulation \d+ of/
    - link /Energy Efficiency \(Private Rented Property\) \(England and Wales\) Regulations \d+/:
      - /url: https://www.legislation.gov.uk/uksi/2015/962/regulation/20
    - text: .
  - heading "What does not count as a non-domestic PRS property" [level=1]
  - paragraph: "A property is not a non-domestic PRS property if it does not need an EPC, and is not part of a building that needs one under:"
  - list:
    - listitem: /the Energy Performance of Buildings \(Certificates and Inspections\) \(England and Wales\) Regulations \d+/
    - listitem: /the Building Regulations \d+/
    - listitem: the Energy Performance of Buildings Regulations (EPB Regulations)
  - paragraph: "A property is also not a non-domestic PRS property if it is let on a tenancy of 6 months or less, unless:"
  - list:
    - listitem: the tenancy agreement allows the tenant to renew or extend the term beyond 6 months, or
    - listitem: /the tenant had already been in continuous occupation for more than \d+ months when the tenancy was granted/
  - paragraph: /A property is not a non-domestic PRS property if it is let on a tenancy of \d+ years or more\./
  - paragraph: Any such property is not within the scope of the MEES Regulations.
  - heading "What is shown in this service" [level=1]
  - paragraph: This service shows non-domestic commercial properties and, where possible, shows evidence that may indicate they belong to the Private Rented Sector (PRS). Before taking any enforcement action, local authorities should verify the property's rental status using their own checks and evidence.
  - paragraph: "If a property has the 'Rental evidence' label 'Found' then the property has one or more of:"
  - list:
    - listitem: an EPC transaction type of 'Mandatory issue (Property to let)' - this is the reason that the EPC for that property was generated
    - listitem: a company listed as a property owner with a Standard Industrial Classification (SIC) code indicating that the company lets property
  - paragraph: If a property has the 'Rental evidence' label 'Not found', the data sources did not show the above. This does not mean that the property is not rented.