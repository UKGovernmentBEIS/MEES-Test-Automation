    - paragraph: Guidance
    - heading "Understanding penalties" [level=1]
    - paragraph: If you are satisfied that a property is not compliant with the MEES Regulations, you may choose to impose a penalty on the landlord. The types of penalties you can impose are a financial penalty and a publication penalty.
    - term: "From:"
    - definition:
      - link "Department for Energy Security and Net Zero":
        - /url: https://www.gov.uk/government/organisations/department-for-energy-security-and-net-zero
    - term: Published
    - definition: /6 March \d+/
    - term: Last updated
    - definition: /6 March \d+/
    - heading "Contents" [level=2]
    - heading "─ Financial penalties" [level=3]:
      - text: ""
      - link "Financial penalties":
        - /url: "#financial"
    - heading "─ Publication penalties" [level=3]:
      - text: ""
