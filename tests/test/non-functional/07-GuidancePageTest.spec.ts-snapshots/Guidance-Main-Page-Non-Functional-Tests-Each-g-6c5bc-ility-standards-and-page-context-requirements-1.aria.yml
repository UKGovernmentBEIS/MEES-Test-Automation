  - heading "Contacting a landlord before issuing a compliance notice" [level=2]
  - paragraph: You may reach out to landlords to notify them informally that they need to improve the energy efficiency of their properties. You may choose to do this because the landlord may not realise that their property is non-compliant.
  - paragraph: This informal engagement step can help to resolve simple cases of non-compliance without the need for formal enforcement action.
  - paragraph:
    - text: Landlords have guidance on the
    - link "MEES Regulations":
      - /url: https://www.gov.uk/guidance/non-domestic-private-rented-property-minimum-energy-efficiency-standard-landlord-guidance
    - text: and the
    - link "PRS Exemptions Register":
      - /url: https://www.gov.uk/government/publications/private-rented-sector-minimum-energy-efficiency-standard-exemptions/guidance-on-prs-exemptions-and-exemptions-register-evidence-requirements
    - text: publicly available to them which you may wish to share.
  - heading "Issuing a compliance notice" [level=2]
  - paragraph: "A compliance notice may request either the original or copies of the following information:"
  - list:
    - listitem: the EPC that was valid for the time when the property was let
    - listitem: the current tenancy agreement used for letting the property
    - listitem: any qualifying assessment report relating to the property
    - listitem: any other relevant document that are required for you to carry out compliance and enforcement activities
  - paragraph:
    - text: A compliance notice can also require the landlord to register the requested information on the
    - link "PRS Exemptions Register.":
      - /url: https://prsregister.beis.gov.uk/NdsBeisUi/register-search-exemptions
  - paragraph: Compliance notices must be sent in writing, as a hard copy or electronically. You may send amendments to the compliance notice in the same way.
  - paragraph: You must give landlords at least one calendar month to respond to a compliance notice.
  - paragraph: You can withdraw a compliance notice.
  - paragraph:
    - link "Check the templates section for compliance notice templates.":
      - /url: /https://[^/]+/compliance/templates/