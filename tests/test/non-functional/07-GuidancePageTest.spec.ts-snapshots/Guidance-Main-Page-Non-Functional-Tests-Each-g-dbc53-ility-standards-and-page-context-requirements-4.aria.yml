  - heading "The Minimum Energy Efficiency Standard" [level=1]
  - paragraph:
    - text: Part 3 of the
    - link /Energy Efficiency \(Private Rented Property\) \(England and Wales\) Regulations \d+\./:
      - /url: https://www.legislation.gov.uk/uksi/2015/962/contents
    - text: imposes a minimum energy efficiency standards for non-domestic privately rented properties (the "MEES Regulations").
  - paragraph: The MEES Regulations aim to reduce emissions and improve energy performance across the Private Rented Sector (PRS).
  - heading "Current minimum energy rating" [level=1]
  - paragraph: Landlords of non-domestic privately rented properties who have an energy performance certificate (EPC), must comply with the MEES Regulations by holding an EPC for energy band E (unless a valid exemption applies).
  - paragraph: /Since 1 April \d+, landlords cannot grant a new lease for a property rated F or G\./
  - paragraph: /Since 1 April \d+, the same requirement applies to all non-domestic rented properties, including those with existing tenants\./
  - paragraph: "If a landlord wants to continue letting a property with a F or G rating, they must either:"
  - list:
    - listitem: improve the energy rating to at least E
    - listitem: register a valid exemption on the PRS Exemptions Register
  - heading "Your responsibilities as an enforcement officer" [level=1]
  - paragraph: You need to determine whether a property is in scope of the MEES Regulations, determine if it meets the minimum standard of energy efficiency, and check if a valid PRS exemption exists before you can assess non-compliance.
  - paragraph:
    - link "An enforcement timeline is available in this service to assist you with this.":
      - /url: https://prsminimumenergystandards--qa.sandbox.my.site.com/compliance/guidance-detail?contentKey=MC6MPUO6E7K5FBJDQOAA34AGC4NY
  - paragraph: "You must use your own judgement and carry out due diligence. Always verify information with external systems such as:"
  - list:
    - listitem:
      - text: the official
      - link "EPC Register":
        - /url: https://www.gov.uk/find-energy-certificate
    - listitem:
      - text: the
      - link "PRS Exemptions Register":
        - /url: https://prsregister.beis.gov.uk/NdsBeisUi/register-search-exemptions
    - listitem: local authority tenancy records
    - listitem: relevant legislation and guidance
  - heading "Exemptions you may encounter" [level=1]
  - paragraph: "A landlord may legally let a sub-standard property if they register a valid exemption on the PRS Exemptions Register. The exemptions that apply to non-domestic properties are:"
  - list:
    - listitem: ‘7 Year Payback’ Exemption
    - listitem: ‘All Improvements Made’ Exemption
    - listitem: ‘Wall Insulation’ Exemption
    - listitem: ‘Consent’ Exemption
    - listitem: ‘Devaluation’ Exemption
    - listitem: ‘New Landlord’ Exemption
  - paragraph: "You should always confirm that:"
  - list:
    - listitem: the exemption is correctly registered
    - listitem: it applies to the specific property
    - listitem: it is still valid within its time frame
  - paragraph:
    - link "Guidance on these exemption types and the evidence that a landlord can submit with their exemption is available on GOV.UK.":
      - /url: https://www.gov.uk/government/publications/private-rented-sector-minimum-energy-efficiency-standard-exemptions/guidance-on-prs-exemptions-and-exemptions-register-evidence-requirements
  - heading "If you need more information" [level=1]
  - paragraph: "You can:"
  - list:
    - listitem:
      - link "read the full non-domestic MEES landlord and enforcement guidance":
        - /url: https://www.gov.uk/guidance/non-domestic-private-rented-property-minimum-energy-efficiency-standard-landlord-guidance
    - listitem:
      - link /refer to the Energy Efficiency \(Private Rented Property\) \(England and Wales\) Regulations \d+/:
