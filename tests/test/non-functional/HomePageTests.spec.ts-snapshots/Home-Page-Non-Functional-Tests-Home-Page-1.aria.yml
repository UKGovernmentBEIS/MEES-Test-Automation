  - main:
    - heading "Tools and guidance for enforcing energy standards" [level=1]
    - paragraph: Use this service to access information and tools to help you enforce the Minimum Energy Efficiency Standards (MEES) Regulations for non-domestic properties in the Private Rented Sector (PRS).
    - paragraph: You can view property and landlord details, get guidance on enforcement, download letter templates, and calculate financial penalties.
    - separator
    - heading "Property records" [level=2]
    - paragraph: This includes non-domestic property details, landlord details, energy rating, and PRS exemption status.
    - paragraph:
      - link "View property records":
        - /url: /filter-properties
    - heading "Guidance" [level=2]
    - paragraph: Check enforcement steps you can take for suspected non-domestic properties in breach of the MEES Regulations.
    - paragraph:
      - link "View guidance":
        - /url: "#-33"
    - heading "Templates" [level=2]
    - paragraph: Download letter templates for issuing compliance notices and penalty notices to non-domestic landlords.
    - paragraph:
      - link "View templates":
        - /url: "#-33"
    - heading "Penalty calculator" [level=2]
    - paragraph: Calculate a possible penalty amount for a non-domestic property in breach of the MEES Regulations.
    - paragraph:
      - link "View penalty calculator":
        - /url: "#-33"