- main:
  - heading "Cookies" [level=1]
  - text: Cookies are small files saved on your phone, tablet or computer when you visit a website. We use cookies to make this service work and collect information about how you use our service.
  - table:
    - rowgroup:
      - row "Name Purpose Expires":
        - columnheader "Name"
        - columnheader "Purpose"
        - columnheader "Expires"
    - rowgroup:
      - row "AMP_TOKEN Contains a token code that is used to read out a Client ID from the AMP Client ID Service. By matching this ID with that of Google Analytics, users can be matched when switching between AMP content and non-AMP content. 1 year":
        - cell "AMP_TOKEN"
        - cell "Contains a token code that is used to read out a Client ID from the AMP Client ID Service. By matching this ID with that of Google Analytics, users can be matched when switching between AMP content and non-AMP content."
        - cell "1 year"
      - row "FPAU Assigns a specific ID to the visitor. This allows the website to determine the number of specific user-visits for analysis and statistics. session":
        - cell "FPAU"
        - cell "Assigns a specific ID to the visitor. This allows the website to determine the number of specific user-visits for analysis and statistics."
        - cell "session"
      - row "FPID Registers statistical data on users' behaviour on the website. Used for internal analytics by the website operator. 1 year":
        - cell "FPID"
        - cell "Registers statistical data on users' behaviour on the website. Used for internal analytics by the website operator."
        - cell "1 year"
      - row /FPLC This FPLC cookie is the cross-domain linker cookie hashed from the FPID cookie\. It’s not HttpOnly, which means it can be read with JavaScript\. It has a relatively short lifetime, just \d+ hours\. \d+ hours/:
        - cell "FPLC"
        - cell /This FPLC cookie is the cross-domain linker cookie hashed from the FPID cookie\. It’s not HttpOnly, which means it can be read with JavaScript\. It has a relatively short lifetime, just \d+ hours\./
        - cell /\d+ hours/
      - row "__utma ID used to identify users and sessions. 2 years":
        - cell "__utma"
        - cell "ID used to identify users and sessions."
        - cell "2 years"
      - row /__utmb Used to distinguish new sessions and visits\. This cookie is set when the GA\.js javascript library is loaded and there is no existing __utmb cookie\. The cookie is updated every time data is sent to the Google Analytics server\. \d+ minutes/:
        - cell "__utmb"
        - cell "Used to distinguish new sessions and visits. This cookie is set when the GA.js javascript library is loaded and there is no existing __utmb cookie. The cookie is updated every time data is sent to the Google Analytics server."
        - cell /\d+ minutes/
      - row "__utmc Used only with old Urchin versions of Google Analytics and not with GA.js. Was used to distinguish between new sessions and visits at the end of a session. session":
        - cell "__utmc"
        - cell "Used only with old Urchin versions of Google Analytics and not with GA.js. Was used to distinguish between new sessions and visits at the end of a session."
        - cell "session"
      - row /__utmt Used to monitor number of Google Analytics server requests\. \d+ minutes/:
        - cell "__utmt"
        - cell "Used to monitor number of Google Analytics server requests."
        - cell /\d+ minutes/
      - row "__utmv Contains custom information set by the web developer through the _setCustomVar method in Google Analytics. This cookie is updated each time new data is sent to the Google Analytics server. 2 years":
        - cell "__utmv"
        - cell "Contains custom information set by the web developer through the _setCustomVar method in Google Analytics. This cookie is updated each time new data is sent to the Google Analytics server."
        - cell "2 years"
      - row /__utmx Used to determine whether a user is included in an A \/ B or Multivariate test\. \d+ months/:
        - cell "__utmx"
        - cell "Used to determine whether a user is included in an A / B or Multivariate test."
        - cell /\d+ months/
      - row /__utmxx Used to determine when the A \/ B or Multivariate test in which the user participates ends\. \d+ months/:
        - cell "__utmxx"
        - cell "Used to determine when the A / B or Multivariate test in which the user participates ends."
        - cell /\d+ months/
      - row "__utmz Contains information about the traffic source or campaign that directed user to the website. The cookie is set when the GA.js javascript is loaded and updated when data is sent to the Google Anaytics server. 6 months":
        - cell "__utmz"
        - cell "Contains information about the traffic source or campaign that directed user to the website. The cookie is set when the GA.js javascript is loaded and updated when data is sent to the Google Anaytics server."
        - cell "6 months"
      - row "_dc_gtm_ Used to monitor number of Google Analytics server requests. 1 minute":
        - cell "_dc_gtm_"
        - cell "Used to monitor number of Google Analytics server requests."
        - cell "1 minute"
      - row "_ga ID used to identify users. 1 years":
        - cell "_ga"
        - cell "ID used to identify users."
        - cell "1 years"
      - row "_ga_* Used to identify and track an individual user session. 2 years":
        - cell "_ga_*"
        - cell "Used to identify and track an individual user session."
        - cell "2 years"
      - row /_gac_ Contains information related to marketing campaigns of the user\. These are shared with Google AdWords \/ Google Ads when the Google Ads and Google Analytics accounts are linked together\. \d+ days/:
        - cell "_gac_"
        - cell "Contains information related to marketing campaigns of the user. These are shared with Google AdWords / Google Ads when the Google Ads and Google Analytics accounts are linked together."
        - cell /\d+ days/
      - row /_gat Used to monitor number of Google Analytics server requests when using Google Tag Manager\. \d+ seconds/:
        - cell "_gat"
        - cell "Used to monitor number of Google Analytics server requests when using Google Tag Manager."
        - cell /\d+ seconds/
      - row "_gat_* Used to set and get tracking data. 1 hour":
        - cell "_gat_*"
        - cell "Used to set and get tracking data."
        - cell "1 hour"
      - row /_gid ID used to identify users for \d+ hours\. \d+ hours/:
        - cell "_gid"
        - cell /ID used to identify users for \d+ hours\./
        - cell /\d+ hours/
  - heading [level=2]
  - group "Strictly Necessary Cookies":
    - text: Strictly Necessary Cookies Essential cookies keep your information secure while you use this service. We do not need to ask permission to use them.
    - radio "Yes" [checked] [disabled]
    - text: ""
    - radio "No" [disabled]
    - text: ""
  - group "Analytics cookies (optional)":
    - text: Analytics cookies (optional) With your permission, we use Google Analytics to collect data about how you use our Check if non-domestic properties meet minimum energy efficiency standards service. This information helps us to improve our service.
    - radio "Yes"
    - text: ""
    - radio "No"
    - text: ""
  - button "Save cookie settings"