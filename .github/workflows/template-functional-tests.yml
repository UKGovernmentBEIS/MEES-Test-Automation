name: Functional Tests (template)

on:
  workflow_call:
    inputs:
      environment:
        description: 'GitHub environment name'
        required: true
        type: string
      ref:
        description: 'Git ref to checkout (leave empty for default branch HEAD)'
        required: false
        type: string
        default: ''
      report_suffix:
        description: 'Suffix appended to artifact names (e.g. qa or uat)'
        required: true
        type: string

jobs:
  functional-tests:
    name: Functional Tests (${{ inputs.environment }})
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-jammy
    environment: ${{ inputs.environment }}
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ inputs.ref }}
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Run authentication setup
      run: npx playwright test --project=setup
      env:
        TEST_ACCOUNT_1_EMAIL: ${{ secrets.TEST_ACCOUNT_1_EMAIL }}
        TEST_ACCOUNT_1_PASSWORD: ${{ secrets.TEST_ACCOUNT_1_PASSWORD }}
        TEST_ACCOUNT_1_NAME: ${{ secrets.TEST_ACCOUNT_1_NAME }}
        TEST_ACCOUNT_2_EMAIL: ${{ secrets.TEST_ACCOUNT_2_EMAIL }}
        TEST_ACCOUNT_2_PASSWORD: ${{ secrets.TEST_ACCOUNT_2_PASSWORD }}
        TEST_ACCOUNT_2_NAME: ${{ secrets.TEST_ACCOUNT_2_NAME }}
        BASE_URL: ${{ secrets.BASE_URL }}
    - name: Run functional tests
      run: npx playwright test --project=functional
      env:
        HOME: /root
        TEST_ACCOUNT_1_EMAIL: ${{ secrets.TEST_ACCOUNT_1_EMAIL }}
        TEST_ACCOUNT_1_PASSWORD: ${{ secrets.TEST_ACCOUNT_1_PASSWORD }}
        TEST_ACCOUNT_1_NAME: ${{ secrets.TEST_ACCOUNT_1_NAME }}
        TEST_ACCOUNT_2_EMAIL: ${{ secrets.TEST_ACCOUNT_2_EMAIL }}
        TEST_ACCOUNT_2_PASSWORD: ${{ secrets.TEST_ACCOUNT_2_PASSWORD }}
        TEST_ACCOUNT_2_NAME: ${{ secrets.TEST_ACCOUNT_2_NAME }}
        TEST_DUAL_ACCESS_EMAIL: ${{ secrets.TEST_DUAL_ACCESS_EMAIL }}
        TEST_DUAL_ACCESS_PASSWORD: ${{ secrets.TEST_DUAL_ACCESS_PASSWORD }}
        PROPERTIES_KEY: ${{ secrets.PROPERTIES_KEY }}
        PROPERTYDETAIL_KEY: ${{ secrets.PROPERTYDETAIL_KEY }}
        EXPORT_KEY: ${{ secrets.EXPORT_KEY }}
        DMS_BASE_URL: ${{ secrets.DMS_BASE_URL }}
        BASE_URL: ${{ secrets.BASE_URL }}
    - name: Upload Playwright HTML report
      uses: actions/upload-artifact@v4
      if: ${{ failure() }}
      with:
        name: functional-test-report-${{ inputs.report_suffix }}
        path: playwright-report/
        retention-days: 2
