name: API Tests (template)

on:
  workflow_call:
    inputs:
      environment:
        description: 'GitHub environment name'
        required: true
        type: string
      ref:
        description: 'Git ref to checkout (leave empty for default branch HEAD)'
        required: false
        type: string
        default: ''
      report_suffix:
        description: 'Suffix appended to artifact names (e.g. qa or uat)'
        required: true
        type: string

jobs:
  api-tests:
    name: API Tests (${{ inputs.environment }})
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ inputs.ref }}
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Run api tests
      run: npx playwright test --project=api
      env:
        PROPERTYDETAIL_KEY: ${{ secrets.PROPERTYDETAIL_KEY }}
        PROPERTIES_KEY: ${{ secrets.PROPERTIES_KEY }}
        EXPORT_KEY: ${{ secrets.EXPORT_KEY }}
        DMS_BASE_URL: ${{ secrets.DMS_BASE_URL }}
        LOCAL_AUTHORITIES_KEY: ${{ secrets.LOCAL_AUTHORITIES_KEY }}
    - name: Upload Playwright HTML report
      uses: actions/upload-artifact@v4
      if: ${{ failure() }}
      with:
        name: api-test-report-${{ inputs.report_suffix }}
        path: playwright-report/
        retention-days: 2
