name: Playwright Tests (UAT)

on:
  schedule:
    - cron: '55 23 * * *'  # Runs at 11:55 PM UTC every day
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to test (leave empty for latest)'
        required: false
        type: string

jobs:
  resolve-tag:
    name: Resolve Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: Resolve tag
      id: get-tag
      run: |
        git fetch --tags
        if [ -n "${{ inputs.tag }}" ]; then
          TAG="${{ inputs.tag }}"
        else
          TAG=$(git describe --tags --abbrev=0)
        fi
        echo "Resolved tag: $TAG"
        echo "tag=$TAG" >> $GITHUB_OUTPUT

  functional-tests:
    name: Functional Tests (new uat)
    needs: resolve-tag
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-jammy
    environment: new uat
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ needs.resolve-tag.outputs.tag }}
    - uses: ./.github/actions/functional-tests
      with:
        report_suffix: uat
        base_url: ${{ secrets.BASE_URL }}
        test_account_1_email: ${{ secrets.TEST_ACCOUNT_1_EMAIL }}
        test_account_1_password: ${{ secrets.TEST_ACCOUNT_1_PASSWORD }}
        test_account_1_name: ${{ secrets.TEST_ACCOUNT_1_NAME }}
        test_account_2_email: ${{ secrets.TEST_ACCOUNT_2_EMAIL }}
        test_account_2_password: ${{ secrets.TEST_ACCOUNT_2_PASSWORD }}
        test_account_2_name: ${{ secrets.TEST_ACCOUNT_2_NAME }}
        test_dual_access_email: ${{ secrets.TEST_DUAL_ACCESS_EMAIL }}
        test_dual_access_password: ${{ secrets.TEST_DUAL_ACCESS_PASSWORD }}
        properties_key: ${{ secrets.PROPERTIES_KEY }}
        propertydetail_key: ${{ secrets.PROPERTYDETAIL_KEY }}
        export_key: ${{ secrets.EXPORT_KEY }}
        dms_base_url: ${{ secrets.DMS_BASE_URL }}

  non-functional-tests:
    name: Non-Functional Tests (new uat)
    needs: resolve-tag
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-jammy
    environment: new uat
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ needs.resolve-tag.outputs.tag }}
    - uses: ./.github/actions/non-functional-tests
      with:
        report_suffix: uat
        base_url: ${{ secrets.BASE_URL }}
        test_account_1_email: ${{ secrets.TEST_ACCOUNT_1_EMAIL }}
        test_account_1_password: ${{ secrets.TEST_ACCOUNT_1_PASSWORD }}
        test_account_1_name: ${{ secrets.TEST_ACCOUNT_1_NAME }}
        test_account_2_email: ${{ secrets.TEST_ACCOUNT_2_EMAIL }}
        test_account_2_password: ${{ secrets.TEST_ACCOUNT_2_PASSWORD }}
        test_account_2_name: ${{ secrets.TEST_ACCOUNT_2_NAME }}
        test_no_access_email: ${{ secrets.TEST_NO_ACCESS_EMAIL }}
        test_no_access_password: ${{ secrets.TEST_NO_ACCESS_PASSWORD }}

  api-tests:
    name: API Tests (new uat)
    needs: resolve-tag
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: new uat
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ needs.resolve-tag.outputs.tag }}
    - uses: ./.github/actions/api-tests
      with:
        report_suffix: uat
        propertydetail_key: ${{ secrets.PROPERTYDETAIL_KEY }}
        properties_key: ${{ secrets.PROPERTIES_KEY }}
        export_key: ${{ secrets.EXPORT_KEY }}
        dms_base_url: ${{ secrets.DMS_BASE_URL }}
        local_authorities_key: ${{ secrets.LOCAL_AUTHORITIES_KEY }}

