name: Playwright Tests (UAT)

on:
  schedule:
    - cron: '55 23 * * *'  # Runs at 11:55 PM UTC every day
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to test (leave empty for latest)'
        required: false
        type: string

jobs:
  resolve-tag:
    name: Resolve Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: Resolve tag
      id: get-tag
      run: |
        git fetch --tags
        if [ -n "${{ inputs.tag }}" ]; then
          TAG="${{ inputs.tag }}"
        else
          TAG=$(git describe --tags --abbrev=0)
        fi
        echo "Resolved tag: $TAG"
        echo "tag=$TAG" >> $GITHUB_OUTPUT

  functional-tests:
    needs: resolve-tag
    uses: ./.github/workflows/templates/functional-tests.yml
    with:
      environment: 'new uat'
      ref: ${{ needs.resolve-tag.outputs.tag }}
      report_suffix: 'uat'
    secrets: inherit

  non-functional-tests:
    needs: resolve-tag
    uses: ./.github/workflows/templates/non-functional-tests.yml
    with:
      environment: 'new uat'
      ref: ${{ needs.resolve-tag.outputs.tag }}
      report_suffix: 'uat'
    secrets: inherit

  api-tests:
    needs: resolve-tag
    uses: ./.github/workflows/templates/api-tests.yml
    with:
      environment: 'new uat'
      ref: ${{ needs.resolve-tag.outputs.tag }}
      report_suffix: 'uat'
    secrets: inherit
