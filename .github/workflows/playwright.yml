name: Playwright Tests
on: 
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 4 * * *'  # Runs at 4:00 AM UTC every day
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        type: choice
        options:
          - dev
          - qa

jobs:
  functional-tests:
    name: Functional Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'qa' }}
    steps: 
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run authentication setup
      run: npx playwright test --project=setup
      env:
        PROPERTIES_KEY: ${{ secrets.PROPERTIES_KEY }}
        DMS_BASE_URL: ${{ secrets.DMS_BASE_URL }} 
        TEST_ACCOUNT_1_EMAIL: ${{ secrets.TEST_ACCOUNT_1_EMAIL }}
        TEST_ACCOUNT_1_PASSWORD: ${{ secrets.TEST_ACCOUNT_1_PASSWORD }}
        TEST_ACCOUNT_2_EMAIL: ${{ secrets.TEST_ACCOUNT_2_EMAIL }}
        TEST_ACCOUNT_2_PASSWORD: ${{ secrets.TEST_ACCOUNT_2_PASSWORD }}
        BASE_URL: ${{ secrets.BASE_URL }}
    - name: Run functional tests
      run: npx playwright test --project=functional
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
    - name: Clear authentication state
      run: npx playwright test --project=teardown
    - name: Upload Playwright HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: functional-test-report-${{ inputs.environment || 'qa' }}
        path: playwright-report/
        retention-days: 30

  non-functional-tests: 
    name: Non-Functional Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'qa' }}
    needs: functional-tests
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run authentication setup
      run: npx playwright test --project=setup
      env:
        TEST_ACCOUNT_1_EMAIL: ${{ secrets.TEST_ACCOUNT_1_EMAIL }}
        TEST_ACCOUNT_1_PASSWORD: ${{ secrets.TEST_ACCOUNT_1_PASSWORD }}
        TEST_ACCOUNT_2_EMAIL: ${{ secrets.TEST_ACCOUNT_2_EMAIL }}
        TEST_ACCOUNT_2_PASSWORD: ${{ secrets.TEST_ACCOUNT_2_PASSWORD }}
        BASE_URL: ${{ secrets.BASE_URL }}
    - name: Run non-functional tests
      run: npx playwright test --project=non-functional
      env:
        TEST_ACCOUNT_1_EMAIL: ${{ secrets.TEST_ACCOUNT_1_EMAIL }}
        TEST_NO_ACCESS_EMAIL: ${{ secrets.TEST_NO_ACCESS_EMAIL }}
        TEST_NO_ACCESS_PASSWORD: ${{ secrets.TEST_NO_ACCESS_PASSWORD }}
        BASE_URL: ${{ secrets.BASE_URL }}
    - name: Clear authentication state
      run: npx playwright test --project=teardown
    - name: Upload Playwright HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: non-functional-test-report-${{ inputs.environment || 'qa' }}
        path: playwright-report/
        retention-days: 30
    - name: Upload Non-Functional Test Coverage Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: non-functional-coverage-report-${{ inputs.environment || 'qa' }}
        path: test-results/non-functional-test-coverage.*
        retention-days: 30

  api-tests: 
    name: API Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'qa' }}
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Run api tests
      run: npx playwright test --project=api
      env:
        PROPERTIES_KEY: ${{ secrets.PROPERTIES_KEY }}
        DMS_BASE_URL: ${{ secrets.DMS_BASE_URL }} 
        LOCAL_AUTHORITIES_KEY: ${{ secrets.LOCAL_AUTHORITIES_KEY }}
    - name: Upload Playwright HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: api-test-report-${{ inputs.environment || 'qa' }}
        path: playwright-report/
        retention-days: 30