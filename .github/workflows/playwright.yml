name: Playwright Tests
on: 
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        type: choice
        options:
          - dev
          - qa

jobs:
  setup:
    name: Authentication Setup
    timeout-minutes: 15
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'qa' }}
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run authentication setup
      run: npx playwright test --project=setup
      env:
        TEST_ACCOUNT_1_EMAIL: ${{ secrets.TEST_ACCOUNT_1_EMAIL }}
        TEST_ACCOUNT_1_PASSWORD: ${{ secrets.TEST_ACCOUNT_1_PASSWORD }}
        TEST_ACCOUNT_2_EMAIL: ${{ secrets.TEST_ACCOUNT_2_EMAIL }}
        TEST_ACCOUNT_2_PASSWORD: ${{ secrets.TEST_ACCOUNT_2_PASSWORD }}
        BASE_URL: ${{ secrets.BASE_URL }}
    - name: Upload Playwright HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: setup-test-report-${{ inputs.environment || 'qa' }}
        path: playwright-report/
        retention-days: 30
    - name: Upload authentication state
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-auth-${{ inputs.environment || 'qa' }}
        path: ${{ github.workspace }}/playwright/auth-states
        retention-days: 1
        if-no-files-found: error

  functional-tests:
    name: Functional Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'qa' }}
    needs: setup
    steps: 
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Download authentication state
      uses: actions/download-artifact@v4
      with: 
        name: playwright-auth-${{ inputs.environment || 'qa' }}
        path: playwright/auth-states
    - name: Run functional tests
      run: npx playwright test --project=functional
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        AUTH_WORKER_OFFSET: 0
    - name: Upload Playwright HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: functional-test-report-${{ inputs.environment || 'qa' }}
        path: playwright-report/
        retention-days: 30

  non-functional-tests: 
    name: Non-Functional Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'qa' }}
    needs: setup
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Download authentication state
      uses: actions/download-artifact@v4
      with:
        name: playwright-auth-${{ inputs.environment || 'qa' }}
        path: playwright/auth-states
    - name: Run non-functional tests
      run: npx playwright test --project=non-functional
      env:
        TEST_ACCOUNT_1_EMAIL: ${{ secrets.TEST_ACCOUNT_1_EMAIL }}
        TEST_NO_ACCESS_EMAIL: ${{ secrets.TEST_NO_ACCESS_EMAIL }}
        TEST_NO_ACCESS_PASSWORD: ${{ secrets.TEST_NO_ACCESS_PASSWORD }}
        BASE_URL: ${{ secrets.BASE_URL }}
        AUTH_WORKER_OFFSET: 1
    - name: Upload Playwright HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: non-functional-test-report-${{ inputs.environment || 'qa' }}
        path: playwright-report/
        retention-days: 30
    - name: Upload Non-Functional Test Coverage Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: non-functional-coverage-report-${{ inputs.environment || 'qa' }}
        path: test-results/non-functional-test-coverage.*
        retention-days: 30

  api-tests: 
    name: API Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'qa' }}
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Run api tests
      run: npx playwright test --project=api
      env:
        PROPERTIES_KEY: ${{ secrets.PROPERTIES_KEY }}
        DMS_URL: ${{ secrets.DMS_URL }} 
    - name: Upload Playwright HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: api-test-report-${{ inputs.environment || 'qa' }}
        path: playwright-report/
        retention-days: 30