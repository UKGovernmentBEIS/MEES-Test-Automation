name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  # Job 1: Authentication Setup - runs first and creates auth artifacts
  setup:
    name: Authentication Setup
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run authentication setup
      run: npx playwright test --project=setup
      env:
        TEST_ACCOUNT_1_EMAIL: ${{ secrets.TEST_ACCOUNT_1_EMAIL }}
        TEST_ACCOUNT_1_PASSWORD: ${{ secrets.TEST_ACCOUNT_1_PASSWORD }}
        TEST_ACCOUNT_2_EMAIL: ${{ secrets.TEST_ACCOUNT_2_EMAIL }}
        TEST_ACCOUNT_2_PASSWORD: ${{ secrets.TEST_ACCOUNT_2_PASSWORD }}
        BASE_URL: ${{ secrets.BASE_URL }}
    - name: Verify authentication files exist
      run: |
        echo "Current directory: $(pwd)"
        echo "Workspace: ${{ github.workspace }}"
        echo "Checking relative path:"
        ls -la playwright/.auth/
        echo "Checking absolute path:"
        ls -la ${{ github.workspace }}/playwright/.auth/
        echo "Files found:"
        find ${{ github.workspace }}/playwright/.auth/ -type f
    - name: Upload authentication state
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-auth
        path: ${{ github.workspace }}/playwright/.auth
        retention-days: 1
        if-no-files-found: error
        include-hidden-files: true

  # Job 2: Functional Tests - depends on setup, runs in parallel with accessibility
  functional-tests:
    name: Functional Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: setup
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Download authentication state
      uses: actions/download-artifact@v4
      with:
        name: playwright-auth
        path: playwright/.auth/
    - name: Run functional tests
      run: npx playwright test --project=functional
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        AUTH_WORKER_OFFSET: 0
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: functional-test-report
        path: playwright-report/
        retention-days: 30

  # Job 3: Accessibility Tests - depends on setup, runs in parallel with functional
  accessibility-tests:
    name: Accessibility Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: setup
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Download authentication state
      uses: actions/download-artifact@v4
      with:
        name: playwright-auth
        path: playwright/.auth/
    - name: Run accessibility tests
      run: npx playwright test --project=accessibility
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        AUTH_WORKER_OFFSET: 1
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: accessibility-test-report
        path: playwright-report/
        retention-days: 30