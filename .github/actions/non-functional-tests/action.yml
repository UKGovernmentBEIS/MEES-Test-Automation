name: 'Non-Functional Tests'
description: 'Run Playwright non-functional tests (checkout must be done by the calling job)'
inputs:
  report_suffix:
    description: 'Suffix appended to artifact names (e.g. qa or uat)'
    required: true
  base_url:
    required: true
  test_account_1_email:
    required: true
  test_account_1_password:
    required: true
  test_account_1_name:
    required: true
  test_account_2_email:
    required: true
  test_account_2_password:
    required: true
  test_account_2_name:
    required: true
  test_no_access_email:
    required: true
  test_no_access_password:
    required: true
  test_no_access_name:
    required: true

runs:
  using: composite
  steps:
  - uses: actions/setup-node@v5
    with:
      node-version: lts/*
  - name: Install dependencies
    run: npm ci
    shell: bash
  - name: Run authentication setup
    run: npx playwright test --project=setup
    shell: bash
    env:
      TEST_ACCOUNT_1_EMAIL: ${{ inputs.test_account_1_email }}
      TEST_ACCOUNT_1_PASSWORD: ${{ inputs.test_account_1_password }}
      TEST_ACCOUNT_1_NAME: ${{ inputs.test_account_1_name }}
      TEST_ACCOUNT_2_EMAIL: ${{ inputs.test_account_2_email }}
      TEST_ACCOUNT_2_PASSWORD: ${{ inputs.test_account_2_password }}
      TEST_ACCOUNT_2_NAME: ${{ inputs.test_account_2_name }}
      BASE_URL: ${{ inputs.base_url }}
  - name: Run non-functional tests
    run: npx playwright test --project=non-functional
    shell: bash
    env:
      HOME: /root
      TEST_ACCOUNT_1_EMAIL: ${{ inputs.test_account_1_email }}
      TEST_ACCOUNT_1_PASSWORD: ${{ inputs.test_account_1_password }}
      TEST_ACCOUNT_1_NAME: ${{ inputs.test_account_1_name }}
      TEST_ACCOUNT_2_EMAIL: ${{ inputs.test_account_2_email }}
      TEST_ACCOUNT_2_PASSWORD: ${{ inputs.test_account_2_password }}
      TEST_ACCOUNT_2_NAME: ${{ inputs.test_account_2_name }}
      TEST_NO_ACCESS_EMAIL: ${{ inputs.test_no_access_email }}
      TEST_NO_ACCESS_PASSWORD: ${{ inputs.test_no_access_password }}
      TEST_NO_ACCESS_NAME: ${{ inputs.test_no_access_name }}
      BASE_URL: ${{ inputs.base_url }}
  - name: Upload Playwright HTML report
    uses: actions/upload-artifact@v4
    if: ${{ failure() }}
    with:
      name: non-functional-test-report-${{ inputs.report_suffix }}
      path: playwright-report/
      retention-days: 2
  - name: Upload Non-Functional Test Coverage Report
    uses: actions/upload-artifact@v4
    if: ${{ failure() }}
    with:
      name: non-functional-coverage-report-${{ inputs.report_suffix }}
      path: test-results/non-functional-test-coverage.*
      retention-days: 2
