name: 'API Tests'
description: 'Run Playwright API tests (checkout must be done by the calling job)'
inputs:
  report_suffix:
    description: 'Suffix appended to artifact names (e.g. qa or uat)'
    required: true
  propertydetail_key:
    required: true
  properties_key:
    required: true
  export_key:
    required: true
  dms_base_url:
    required: true
  local_authorities_key:
    required: true

runs:
  using: composite
  steps:
  - uses: actions/setup-node@v5
    with:
      node-version: lts/*
  - name: Install dependencies
    run: npm ci
    shell: bash
  - name: Run api tests
    run: npx playwright test --project=api
    shell: bash
    env:
      PROPERTYDETAIL_KEY: ${{ inputs.propertydetail_key }}
      PROPERTIES_KEY: ${{ inputs.properties_key }}
      EXPORT_KEY: ${{ inputs.export_key }}
      DMS_BASE_URL: ${{ inputs.dms_base_url }}
      LOCAL_AUTHORITIES_KEY: ${{ inputs.local_authorities_key }}
  - name: Upload Playwright HTML report
    uses: actions/upload-artifact@v4
    if: ${{ failure() }}
    with:
      name: api-test-report-${{ inputs.report_suffix }}
      path: playwright-report/
      retention-days: 2
